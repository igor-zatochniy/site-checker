services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 6

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6

  api:
    build: .
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_ROLE: api
      STORAGE_TYPE: postgres
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      QUEUE_TYPE: rabbitmq
      RABBITMQ_URL: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
      API_KEY: ${API_KEY}
      ALERT_WEBHOOK_URL: "${ALERT_WEBHOOK_URL:-}"
      HEALTH_ADDR: :8080
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  scheduler:
    build: .
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_ROLE: scheduler
      STORAGE_TYPE: postgres
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      QUEUE_TYPE: rabbitmq
      RABBITMQ_URL: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
      SEED_DEFAULT_LINKS: ${SEED_DEFAULT_LINKS:-false}
      SEED_URLS_FILE: ${SEED_URLS_FILE:-}
      HEALTH_ADDR: :8080
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build: .
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_ROLE: worker
      STORAGE_TYPE: postgres
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      QUEUE_TYPE: rabbitmq
      RABBITMQ_URL: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
      WORKER_COUNT: "5"
      ALERT_WEBHOOK_URL: "${ALERT_WEBHOOK_URL:-}"
      HEALTH_ADDR: :8080
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  alert-dispatcher:
    profiles: ["alerts"]
    build: .
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_ROLE: alert-dispatcher
      STORAGE_TYPE: postgres
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      ALERT_WEBHOOK_URL: "${ALERT_WEBHOOK_URL:-}"
      ALERT_FAILURE_THRESHOLD: "3"
      ALERT_COOLDOWN: 10m
      HEALTH_ADDR: :8080
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
