apiVersion: v1
kind: ConfigMap
metadata:
  name: site-checker-config
  namespace: site-checker
  labels:
    app.kubernetes.io/name: site-checker
data:
  APP_ENV: "production"
  STORAGE_TYPE: "postgres"
  RUN_MIGRATIONS: "true"
  QUEUE_TYPE: "rabbitmq"
  QUEUE_NAME: "site_checker.checks"
  DEAD_LETTER_QUEUE_NAME: "site_checker.checks.dead"
  QUEUE_BUFFER_SIZE: "1000"
  QUEUE_PREFETCH: "10"
  RABBITMQ_CONNECT_TIMEOUT: "5s"
  RABBITMQ_RECONNECT_INITIAL_BACKOFF: "1s"
  RABBITMQ_RECONNECT_MAX_BACKOFF: "30s"
  MAX_JOB_ATTEMPTS: "3"
  WORKER_COUNT: "10"
  SCHEDULER_BATCH_SIZE: "100"
  CHECK_LEASE_TIMEOUT: "2m"
  CHECK_INTERVAL: "5m"
  HTTP_TIMEOUT: "5s"
  HEALTH_ADDR: ":8080"
  EXPECTED_STATUS: "200-399"
  MAX_REDIRECTS: "3"
  MAX_BODY_BYTES: "65536"
  MAX_HEADER_BYTES: "65536"
  ALLOWED_PORTS: "80,443"
  ALLOW_PRIVATE_NETWORKS: "false"
  ALLOW_PROXY_ENV: "false"
  ALERT_FAILURE_THRESHOLD: "3"
  ALERT_COOLDOWN: "10m"
  ALERT_DISPATCH_INTERVAL: "1s"
  ALERT_DISPATCH_BATCH_SIZE: "50"
  ALERT_LEASE_TIMEOUT: "30s"
  ALERT_DELIVERY_TIMEOUT: "5s"
  ALERT_MAX_ATTEMPTS: "8"
  ALERT_RETRY_INITIAL_BACKOFF: "1s"
  ALERT_RETRY_MAX_BACKOFF: "5m"
  ENABLE_PPROF: "false"
  USER_AGENT: "site-checker"
  SEED_DEFAULT_LINKS: "false"
  SEED_URLS_FILE: ""
