apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: site-checker-default-deny
  namespace: site-checker
  labels:
    app.kubernetes.io/name: site-checker
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: site-checker-api-ingress
  namespace: site-checker
  labels:
    app.kubernetes.io/name: site-checker
    app.kubernetes.io/component: api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: site-checker
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
