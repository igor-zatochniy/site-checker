apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: site-checker-api-egress
  namespace: site-checker
  labels:
    app.kubernetes.io/name: site-checker
    app.kubernetes.io/component: api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: site-checker
      app.kubernetes.io/component: api
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: site-checker
              app.kubernetes.io/component: postgres
      ports:
        - protocol: TCP
          port: 5432
---
