apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: site-checker-alert-dispatcher-egress
  namespace: site-checker
  labels:
    app.kubernetes.io/name: site-checker
    app.kubernetes.io/component: alert-dispatcher
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: site-checker
      app.kubernetes.io/component: alert-dispatcher
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: site-checker
              app.kubernetes.io/component: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 0.0.0.0/8
              - 10.0.0.0/8
              - 100.64.0.0/10
              - 127.0.0.0/8
              - 169.254.0.0/16
              - 172.16.0.0/12
              - 192.0.0.0/24
              - 192.0.2.0/24
              - 192.168.0.0/16
              - 198.18.0.0/15
              - 198.51.100.0/24
              - 203.0.113.0/24
              - 224.0.0.0/4
              - 240.0.0.0/4
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
---
