apiVersion: v1
kind: Secret
metadata:
  name: site-checker-secret
  namespace: site-checker
  labels:
    app.kubernetes.io/name: site-checker
type: Opaque
stringData:
  API_KEY: "change-me"
  POSTGRES_PASSWORD: "change-me"
  RABBITMQ_PASSWORD: "change-me"
  DATABASE_URL: "postgres://site_checker:change-me@site-checker-postgres:5432/site_checker?sslmode=disable"
  RABBITMQ_URL: "amqp://site_checker:change-me@site-checker-rabbitmq:5672/"
  ALERT_WEBHOOK_URL: ""
