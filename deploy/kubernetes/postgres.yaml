apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: site-checker-postgres-data
  namespace: site-checker
  labels:
    app.kubernetes.io/name: site-checker
    app.kubernetes.io/component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: site-checker-postgres
  namespace: site-checker
  labels:
    app.kubernetes.io/name: site-checker
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: site-checker
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: site-checker
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: site_checker
            - name: POSTGRES_USER
              value: site_checker
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: site-checker-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "site_checker", "-d", "site_checker"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: site-checker-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: site-checker-postgres
  namespace: site-checker
  labels:
    app.kubernetes.io/name: site-checker
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    app.kubernetes.io/name: site-checker
    app.kubernetes.io/component: postgres
