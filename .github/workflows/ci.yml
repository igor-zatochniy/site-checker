name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - v*

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test and scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run tests with race detector
        run: go test -race ./...

      - name: Run go vet
        run: go vet ./...

      - name: Install Staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run Staticcheck
        run: staticcheck ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  docker:
    name: Build container
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: site-checker:ci
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: site-checker:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: site-checker:ci
          artifact-name: site-checker-sbom.spdx.json

      - name: Push release image
        id: release-image
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Set up kubectl
        if: startsWith(github.ref, 'refs/tags/v')
        uses: azure/setup-kubectl@v5
        with:
          version: v1.32.2

      - name: Render immutable Kubernetes release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          IMAGE_DIGEST: ${{ steps.release-image.outputs.digest }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          test -n "${IMAGE_DIGEST}"
          mkdir -p dist/release
          cat > dist/release/kustomization.yaml <<EOF
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          resources:
            - ../../deploy/kubernetes
          images:
            - name: ghcr.io/igor-zatochniy/site-checker
              newName: ${IMAGE_NAME}
              digest: ${IMAGE_DIGEST}
          EOF
          kubectl kustomize dist/release > "dist/site-checker-kubernetes-${RELEASE_TAG}.yaml"
          printf '%s\n' "${IMAGE_NAME}@${IMAGE_DIGEST}" > "dist/site-checker-image-${RELEASE_TAG}.txt"
          test "$(grep -cF "image: ${IMAGE_NAME}@${IMAGE_DIGEST}" "dist/site-checker-kubernetes-${RELEASE_TAG}.yaml")" -eq 4

      - name: Upload immutable Kubernetes release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: site-checker-kubernetes-${{ github.ref_name }}
          path: |
            dist/site-checker-kubernetes-${{ github.ref_name }}.yaml
            dist/site-checker-image-${{ github.ref_name }}.txt
          if-no-files-found: error

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true

      - name: Run integration tests
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: go test -tags=integration ./...
